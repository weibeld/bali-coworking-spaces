# Datapilot Engine: Unified Schema Specification (Bali Coworking)

# ==============================================================================
# UNIFIED TARGET SCHEMA
# Every field here is a "Task" for the Engine to complete.
# ==============================================================================
schema:
  # --- THE ANCHOR (Discovery + Unique ID) ---
  place_id:
    id: true
    source_llm: "Google Maps"
    # The LLM will use this intent to construct the actual API call
    source_intent: "Find all 'coworking spaces' within 40km of Bali Airport (DPS)."
    extract_raw: "$.places[*].id"

  # --- THE QUALIFIER (Semantic Reasoning via Confidence Scoring) ---
  coworking_confidence:
    source_llm: "Google Maps categories, user reviews, and the official website: $website_url"
    extract_llm: >
      Synthesise all available information (Google Maps labels, user review 
      content mentioning work/WiFi/fees, and the official website content) 
      to calculate a confidence score (0-100) representing the probability 
      that this place provides a dedicated, explicitly marketed coworking 
      service (e.g., memberships, day passes, dedicated quiet zones, or 
      meeting rooms). 
      
      Differentiate clearly between 'laptop-friendly' venues (where work is 
      a side effect) and true coworking environments (where work is the 
      primary intended service).
    constraints_raw: ">= 80"

  # --- BASIC DATA (Deterministic Mapping) ---
  name:
    source_raw: "Google Maps" # Inherited from the anchor's successful query
    extract_raw: "$.displayName.text"

  rating_count:
    source_raw: "Google Maps"
    extract_raw: "$.userRatingCount"
    constraints_raw: ">= 20"

  website_url:
    source_raw: "Google Maps"
    extract_raw: "$.websiteUri"

  # --- ENRICHED DATA (Semantic Joins via Variable Injection) ---
  pricing_page:
    # Dependency is implicit from the $website_url variable
    source_llm: "Find the direct URL for pricing, membership, or day pass on the official website: $website_url"
    extract_llm: "Return the most relevant URL for pricing information."

  access_times:
    # Dependency is implicit from the $website_url variable
    source_llm: "Extract member-specific open and close hours from $website_url."
    extract_llm: "Use 00:00-00:00 for 24/7 access. Distinguish between public cafe and member-only hours."
    properties:
      start: { type: "string" }
      end: { type: "string" }
      source: { type: "string" }
