# Datapilot Engine: Unified Schema Specification (Bali Coworking)

# ==============================================================================
# UNIFIED TARGET SCHEMA
# ==============================================================================
schema:
  # --- ROOT FIELDS (Zero dependencies, defining the Anchor Source) ---
  place_id:
    source_llm: "Coworking spaces on Google Maps"
    extract_raw: "$.places[*].id"

  name:
    source_llm: "Coworking spaces on Google Maps"
    extract_raw: "$.displayName.text"

  location:
    source_llm: "Coworking spaces on Google Maps"
    constraints_llm: "Within 40km of Bali Airport (DPS)."
    extract_raw: "$.location"

  rating:
    source_llm: "Coworking spaces on Google Maps"
    extract_raw: "$.rating"

  rating_count:
    source_llm: "Coworking spaces on Google Maps"
    extract_raw: "$.userRatingCount"
    constraints_raw: ">= 20"

  website_url:
    source_llm: "Coworking spaces on Google Maps"
    extract_raw: "$.websiteUri"

  google_maps_url:
    source_llm: "Coworking spaces on Google Maps"
    extract_raw: "$.googleMapsUri"

  # --- THE QUALIFIER (Semantic Reasoning via Confidence Scoring) ---
  coworking_confidence:
    source_llm: "Google Maps categories and user reviews for $name (ID: $place_id)"
    extract_llm: >
      Evaluate if this is a dedicated coworking space. Differentiate 
      clearly between 'laptop-friendly' venues and true coworking 
      environments (memberships, day passes, quiet zones).
      
      Return a confidence score between 0 and 100.
    constraints_raw: ">= 80"

  # --- ENRICHED DATA (Semantic Joins) ---
  pricing_page:
    source_llm: "Find the direct URL for pricing/membership for $name on its official website: $website_url"
    extract_llm: "Return the most relevant URL for pricing information."

  access_times:
    source_llm: "Extract member-specific open and close hours for $name from $website_url."
    extract_llm: "Use 00:00-00:00 for 24/7 access."
    properties:
      start: { type: "string" }
      end: { type: "string" }
      source: { type: "string" }
